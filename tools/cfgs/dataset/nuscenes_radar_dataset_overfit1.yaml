# nuScenes 雷达专用 dataset cfg
# 模板：tools/cfgs/dataset/vod_dataset_radar.yaml + nuscenes_dataset.yaml
# 适配：pcdet/datasets/nuscenes/nuscenes_radar_dataset.py
DATASET: 'NuScenesRadarDataset'
DATA_PATH: 'data/nuscenes'

VERSION: 'v1.0-mini'
MAX_SWEEPS: 1
PRED_VELOCITY: True
SET_NAN_VELOCITY_TO_ZEROS: True
FILTER_MIN_POINTS_IN_GT: 1
DEBUG_NUM_SAMPLES: 1

# 雷达点云在前向半区，BEV 取 [-51.2, 51.2]，Z 取车体附近 [-3, 2]
POINT_CLOUD_RANGE: [-51.2, -51.2, -3, 51.2, 51.2, 2]

DATA_SPLIT: {
    'train': train,
    'test': val
}

# infos pkl 由 pcdet/datasets/nuscenes/nuscenes_radar_dataset.py 创建
INFO_PATH: {
    'train': [nuscenes_infos_radar_1sweeps_train.pkl],
    'test':  [nuscenes_infos_radar_1sweeps_val.pkl],
}

# CBGS 均衡采样（10 类一起训，避免长尾）
BALANCED_RESAMPLING: False

# 雷达点云只用 FOV 内的点（投影到图像后过滤）
FOV_POINTS_ONLY: True

CLASS_MAPPINGS: {
}

POINT_FEATURE_NORMALIZATION: {
    USE_NORM: False,
}

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['placeholder', 'gt_sampling', 'random_world_flip', 'random_world_rotation', 'random_world_scaling']
    AUG_CONFIG_LIST:
        - NAME: gt_sampling
          USE_ROAD_PLANE: False
          DB_INFO_PATH:
              - nuscenes_dbinfos_radar_1sweeps_train.pkl
          PREPARE: {
             filter_by_min_points: [
                 'car:5','truck:5', 'construction_vehicle:5', 'bus:5', 'trailer:5',
                 'barrier:5', 'motorcycle:5', 'bicycle:5', 'pedestrian:5', 'traffic_cone:5'
             ],
             filter_by_difficulty: [-1],
          }

          SAMPLE_GROUPS: [
              'car:2','truck:3', 'construction_vehicle:7', 'bus:4', 'trailer:6',
              'barrier:2', 'motorcycle:6', 'bicycle:6', 'pedestrian:2', 'traffic_cone:2'
          ]
          NUM_POINT_FEATURES: 7
          DATABASE_WITH_FAKELIDAR: False
          REMOVE_EXTRA_WIDTH: [0.0, 0.0, 0.0]
          LIMIT_WHOLE_SCENE: True

        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']

        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.3925, 0.3925]

        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]

# 7 维：x, y, z, rcs, vx, vy, time（nuscenes RadarPointCloud 切片后常用列）
POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'rcs', 'vx', 'vy', 'time'],
    src_feature_list: ['x', 'y', 'z', 'rcs', 'vx', 'vy', 'time'],
}

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True

    - NAME: shuffle_points
      SHUFFLE_ENABLED: {
        'train': True,
        'test': False
      }

    - NAME: transform_points_to_voxels
      # 雷达点稀疏 → 用粗一点的 voxel（0.2m 比 lidar 的 0.1m 节省 voxel 数）
      VOXEL_SIZE: [0.2, 0.2, 4.0]
      MAX_POINTS_PER_VOXEL: 10
      MAX_NUMBER_OF_VOXELS: {
        'train': 32000,
        'test':  40000
      }
